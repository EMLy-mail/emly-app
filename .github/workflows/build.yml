name: Build EMLy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Windows)
    runs-on: blacksmith-4vcpu-windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Install UPX
        run: choco install upx -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Build EMLy
        run: wails build --devtools --upx

      - name: Compile installer
        run: iscc installer\installer.iss

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMLy-windows-amd64
          path: build/bin/EMLy.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMLy-installer
          path: installer\Output\EMLy_Installer_*.exe
          if-no-files-found: error

      - name: Read version from config
        if: github.event_name != 'pull_request'
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content config.ini | Select-String 'GUI_SEMVER').ToString().Split('=')[1].Trim()
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: EMLy v${{ steps.version.outputs.version }}
          files: |
            build/bin/EMLy.exe
            installer/Output/EMLy_Installer_*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

