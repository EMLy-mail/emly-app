name: Build EMLy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    name: Build (Windows)
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:

          node-version: "lts/*"
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Install UPX
        run: choco install upx -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        
      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Decode signing certificate
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGN_PFX }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $bytes)

      - name: Build EMLy
        run: wails build --devtools --upx

      - name: Sign EMLy.exe
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f "$env:RUNNER_TEMP\codesign.pfx" /p "${{ secrets.CODE_SIGN_PASSWORD }}" /fd sha256 /tr http://timestamp.digicert.com /td sha256 build\bin\EMLy.exe

      - name: Compile & sign installer
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          $pfxPassword = "${{ secrets.CODE_SIGN_PASSWORD }}"
          $signCmd = '$q{0}$q sign /f $q{1}$q /p $q{2}$q /fd sha256 /tr http://timestamp.digicert.com /td sha256 $q$f$q' -f $signtool, $pfxPath, $pfxPassword
          iscc "/Ssigntool=$signCmd" installer\installer.iss
            
      - name: Cleanup certificate
        if: always()
        shell: pwsh
        run: Remove-Item "$env:RUNNER_TEMP\codesign.pfx" -ErrorAction SilentlyContinue

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: EMLy-windows-amd64
          path: build/bin/EMLy.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: EMLy-installer
          path: installer\Output\EMLy_Installer_*.exe
          if-no-files-found: error